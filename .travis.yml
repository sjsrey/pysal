language: python

sudo: false

matrix:
  include:
    - env: ENV_FILE="ci/travis/37-latest-conda-forge.yaml"
      env: PY=3.7

install:
  # Install conda
  - wget https://repo.continuum.io/miniconda/Miniconda3-latest-Linux-x86_64.sh -O miniconda.sh
  - bash miniconda.sh -b -p $HOME/miniconda
  - export PATH="$HOME/miniconda/bin:$PATH"
  - conda config --set always_yes yes --set changeps1 no
  - conda update conda
  - conda info


  # free channel needed for older envs (< py37), see
  # https://github.com/conda/conda/issues/8849
  - conda config --set restore_free_channel true

  # Install dependencies
  - conda env create --file="${ENV_FILE}"
  - source activate test
  - pip install -e .
  - conda list
  - python -c "import pysal; print(pysal.__version__);"

script:
  - py.test pysal --cov pysal -v --cov-report term-missing


notifications:
    email:
        recipients:
            - sjsrey@gmail.com
            - levi.john.wolf@gmail.com
        on_success: change 
        on_failure: always

after_success:
  - coveralls
